<script>
"use strict";
const { useState, useEffect, useRef } = React;
const C = { bg: "#0A1322", bg2: "#0E1B2E", panel: "#12233B", panelSoft: "#172A46", line: "#263B54", text: "#EAF1F9", muted: "#93A7C0", faint: "#6B819C", qiz: "#FF7D93", yigit: "#4CC7F2", amber: "#F6B23D", good: "#5FD08A", bad: "#FF6B6B" };

/* ---------- transliteration ---------- */
function toCyr(t) {
    if (!t)
        return t;
    let s = String(t).replace(/[\u02BB\u02BC\u2018\u2019`]/g, "'");
    s = s.replace(/O'/g, "Ў").replace(/o'/g, "ў").replace(/G'/g, "Ғ").replace(/g'/g, "ғ");
    const dg = [["yo", "ё"], ["yu", "ю"], ["ya", "я"], ["ye", "е"], ["sh", "ш"], ["ch", "ч"], ["ts", "ц"]];
    const sg = { a: "а", b: "б", c: "с", d: "д", e: "е", f: "ф", g: "г", h: "ҳ", i: "и", j: "ж", k: "к", l: "л", m: "м", n: "н", o: "о", p: "п", q: "қ", r: "р", s: "с", t: "т", u: "у", v: "в", w: "в", x: "х", y: "й", z: "з", "'": "ъ" };
    let res = "", i = 0;
    const low = s.toLowerCase();
    while (i < s.length) {
        let m = false;
        for (const [lat, cyr] of dg) {
            if (low.substr(i, lat.length) === lat) {
                const seg = s.substr(i, lat.length);
                const allUp = seg === seg.toUpperCase() && seg !== seg.toLowerCase();
                const fUp = seg[0] === seg[0].toUpperCase() && seg[0] !== seg[0].toLowerCase();
                res += allUp ? cyr.toUpperCase() : (fUp ? cyr[0].toUpperCase() + cyr.slice(1) : cyr);
                i += lat.length;
                m = true;
                break;
            }
        }
        if (m)
            continue;
        const ch = s[i], lc = low[i];
        if (sg[lc] !== undefined) {
            const c = sg[lc];
            res += (ch !== lc) ? c.toUpperCase() : c;
        }
        else
            res += ch;
        i++;
    }
    return res;
}
function toLat(t) {
    if (!t)
        return t;
    const map = { а: "a", б: "b", в: "v", г: "g", ғ: "g'", д: "d", е: "e", ё: "yo", ж: "j", з: "z", и: "i", й: "y", к: "k", қ: "q", л: "l", м: "m", н: "n", о: "o", п: "p", р: "r", с: "s", т: "t", у: "u", ў: "o'", ф: "f", х: "x", ҳ: "h", ц: "ts", ч: "ch", ш: "sh", щ: "sh", ъ: "'", ы: "i", ь: "", э: "e", ю: "yu", я: "ya" };
    let res = "";
    for (const ch of String(t)) {
        const lc = ch.toLowerCase();
        if (map[lc] !== undefined) {
            let o = map[lc];
            if (ch !== lc && o)
                o = o.charAt(0).toUpperCase() + o.slice(1);
            res += o;
        }
        else
            res += ch;
    }

}
const convert = (t, tg) => tg === "cyr" ? toCyr(t) : toLat(t);
/* ---------- pdf.js ---------- */
let pdfPromise = null;
function loadPdfJs() {
    if (window.pdfjsLib)
        return Promise.resolve(window.pdfjsLib);
    if (pdfPromise)
        return pdfPromise;
    pdfPromise = new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
        s.onload = () => { try {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }
        catch (e) { } res(window.pdfjsLib); };
        s.onerror = () => rej(new Error("pdfjs"));
        document.head.appendChild(s);
    });

}
async function extractPdfText(file) {
    const lib = await loadPdfJs();
    const buf = await file.arrayBuffer();
    const pdf = await lib.getDocument({ data: buf }).promise;
    let out = "";
    for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        out += tc.items.map(it => it.str).join(" ") + "\n\n";
    }

}
/* ---------- AI (Google Gemini) ---------- */
async function callAI(prompt) {
    const key = LS.get("snd_apikey", "");
    const model = LS.get("snd_model", "gemini-2.0-flash");
    if (!key)
        throw new Error("NOKEY");
    const url = "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + encodeURIComponent(key);
    const res = await fetch(url, { method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 1600, temperature: 0.7 } }) });
    if (!res.ok) {
        const t = await res.text().catch(() => "");
        throw new Error("API " + res.status + " " + t.slice(0, 160));
    }
    const data = await res.json();
    const cand = (data.candidates && data.candidates[0]) || null;
    const parts = (cand && cand.content && cand.content.parts) || [];
    return parts.map(p => p && p.text ? p.text : "").join("\n");
}
function parseAny(text) {
    if (!text)
        return null;
    let t = String(text).replace(/```json/gi, "").replace(/```/g, "").trim();
    try {
        return JSON.parse(t);
    }
    catch (e) { }
    const iA = t.indexOf("["), iO = t.indexOf("{");
    let start = -1, open = "[";
    if (iA >= 0 && (iO < 0 || iA < iO)) {
        start = iA;
        open = "[";
    }
    else if (iO >= 0) {
        start = iO;
        open = "{";
    }
    if (start < 0)
        return null;
    const close = open === "[" ? "]" : "}";
    let depth = 0, end = -1, inStr = false, esc = false;
    for (let i = start; i < t.length; i++) {
        const ch = t[i];
        if (esc) {
            esc = false;
            continue;
        }
        if (ch === "\\") {
            esc = true;
            continue;
        }
        if (ch === '"')
            inStr = !inStr;
        if (inStr)
            continue;
        if (ch === open)
            depth++;
        else if (ch === close) {
            depth--;
            if (depth === 0) {
                end = i;
                break;
            }
        }
    }
    if (end < 0)
        return null;
    try {
        return JSON.parse(t.slice(start, end + 1));
    }
    catch (e) {
        return null;
    }
}
function toGuest(text) {
    const v = parseAny(text);
    let q = [], f = [];
    if (Array.isArray(v))
        q = v.map(String);
    else if (v) {
        q = Array.isArray(v.questions) ? v.questions.map(String) : (Array.isArray(v.savollar) ? v.savollar.map(String) : []);
        f = Array.isArray(v.facts) ? v.facts.map(String) : (Array.isArray(v.faktlar) ? v.faktlar.map(String) : []);
    }
    return { questions: q.filter(Boolean).slice(0, 5), facts: f.filter(Boolean).slice(0, 3) };
}
function toInfos(text) {
    const v = parseAny(text);
    let bl = [];
    if (Array.isArray(v))
        bl = v;
    else if (v && Array.isArray(v.blocks))
        bl = v.blocks;
    else if (v && Array.isArray(v.bloklar))
        bl = v.bloklar;
    const host = h => (String(h || "").toLowerCase().trim().startsWith("q") ? "qiz" : "yigit");
    return bl.slice(0, 3).map(b => {
        let raw = Array.isArray(b) ? b : (b && (b.lines || b.qatorlar)) || [];
        const lines = raw.map(l => ({ host: host(l && (l.host || l.kim)), text: String((l && (l.text || l.matn)) || "").trim() })).filter(l => l.text);

    }).filter(b => b.lines.length);
}
/* ---------- live store (Firebase or local) ---------- */
const myId = uid();
let fbOk = false, fbLiveRef = null;
let bc = ("BroadcastChannel" in window) ? new BroadcastChannel("toshkentsnd") : null;
function initFirebase() {
    const cfg = LS.get("snd_fb", null);
    if (!cfg || !cfg.databaseURL || !window.firebase) {

        return false;

    try {
        if (!firebase.apps.length)

    catch (e) {
        console.warn("firebase init failed", e);
        fbOk = false;
        return false;
    }
}
function publishLive(obj) {
    const payload = { phase: obj.phase, broadcast: obj.broadcast || null, updatedBy: myId, updatedAt: Date.now() };
    if (fbOk && fbLiveRef) {
        fbLiveRef.set(payload).catch(() => { });
    }
    else {
        LS.set("snd_live", payload);
        if (bc)
            bc.postMessage(payload);
    }
}
function subscribeLive(cb) {
    if (fbOk && fbLiveRef) {
        fbLiveRef.on("value", s => { const v = s.val(); if (v)
            cb(v); });
    }
    else {
        const init = LS.get("snd_live", null);
        if (init)
            cb(init);
        if (bc)
            bc.onmessage = e => cb(e.data);
        window.addEventListener("storage", e => { if (e.key === "snd_live" && e.newValue) {
            try {
                cb(JSON.parse(e.newValue));
            }
            catch (_) { }
        } });
    }
}
initFirebase();
const SIDES = [{ id: "right", t: "O'ng taraf", c: C.yigit }, { id: "left", t: "Chap taraf", c: C.qiz }, { id: "audience", t: "Auditoriya", c: C.amber }];

const Panel = ({ children, style }) => (React.createElement("div", { style: { background: C.panel, border: "1px solid " + C.line, borderRadius: 18, padding: 20, marginBottom: 14, ...style } }, children));
function ScriptToggle({ script, setScript, compact }) {
    return (React.createElement("div", { style: { display: "flex", background: C.panel, border: "1px solid " + C.line, borderRadius: 9, padding: 2, flexShrink: 0 } }, [["lat", "Aa"], ["cyr", "Аа"]].map(([id, lbl]) => (React.createElement("button", { key: id, className: "gc-btn", onClick: () => setScript(id), style: { padding: compact ? "5px 10px" : "6px 12px", borderRadius: 7, fontSize: 13, background: script === id ? C.yigit : "transparent", color: script === id ? "#08131f" : C.muted } }, lbl)))));
}

    };
